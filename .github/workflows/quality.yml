name: Quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify generated locale pages
        shell: bash
        run: |
          set -euo pipefail
          node tools/build-locales.mjs
          git diff --exit-code -- index.html de/index.html ar/index.html

      - name: Validate pages, assets and metadata
        run: python3 .github/scripts/validate_site.py

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Check patch whitespace
        run: git show --check --format= --no-renames HEAD
